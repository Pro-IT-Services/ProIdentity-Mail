stages:
  - test
  - build
  - release

variables:
  GO_VERSION: "1.26.3"
  CGO_ENABLED: "0"
  GOMODCACHE: "$CI_PROJECT_DIR/.cache/gomod"
  GOCACHE: "$CI_PROJECT_DIR/.cache/gobuild"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/gomod
    - .cache/gobuild

unit-test:
  stage: test
  image: "golang:${GO_VERSION}"
  script:
    - go version
    - go test -buildvcs=false ./...

govulncheck:
  stage: test
  image: "golang:${GO_VERSION}"
  script:
    - go install golang.org/x/vuln/cmd/govulncheck@latest
    - govulncheck ./...

build-release:
  stage: build
  image: "golang:${GO_VERSION}"
  needs:
    - unit-test
    - govulncheck
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: manual
      allow_failure: true
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends ca-certificates curl tar gzip
  script:
    - bash scripts/build-release.sh "${CI_COMMIT_TAG:-dev-${CI_COMMIT_SHORT_SHA}}"
    - |
      if [ -n "${CI_COMMIT_TAG}" ]; then
        for file in dist/*.tar.gz dist/SHA256SUMS; do
          curl --fail --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
            --upload-file "${file}" \
            "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/proidentity-mail/${CI_COMMIT_TAG}/$(basename "${file}")"
        done
      fi
  artifacts:
    expire_in: 14 days
    paths:
      - dist/*.tar.gz
      - dist/SHA256SUMS

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - build-release
  rules:
    - if: '$CI_COMMIT_TAG'
  script:
    - echo "Creating GitLab release ${CI_COMMIT_TAG}"
  release:
    tag_name: "$CI_COMMIT_TAG"
    name: "ProIdentity Mail $CI_COMMIT_TAG"
    description: "Binary release for Linux x64, x86, arm, and arm64. Commercial hosted service use requires a ProIdentity commercial license."
    assets:
      links:
        - name: "Linux x64"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/proidentity-mail/${CI_COMMIT_TAG}/proidentity-mail_${CI_COMMIT_TAG}_linux_x64.tar.gz"
        - name: "Linux x86"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/proidentity-mail/${CI_COMMIT_TAG}/proidentity-mail_${CI_COMMIT_TAG}_linux_x86.tar.gz"
        - name: "Linux arm"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/proidentity-mail/${CI_COMMIT_TAG}/proidentity-mail_${CI_COMMIT_TAG}_linux_arm.tar.gz"
        - name: "Linux arm64"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/proidentity-mail/${CI_COMMIT_TAG}/proidentity-mail_${CI_COMMIT_TAG}_linux_arm64.tar.gz"
        - name: "SHA256SUMS"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/proidentity-mail/${CI_COMMIT_TAG}/SHA256SUMS"
