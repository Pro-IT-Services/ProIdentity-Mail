name: Security Check

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  security-check:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache: true

      - name: Run security checks
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File .\scripts\security-check.ps1
