name: Release

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache: true

      - name: Test
        run: go test -buildvcs=false ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache: true

      - name: Build Linux release archives
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="dev-${GITHUB_SHA::12}"
          fi
          bash scripts/build-release.sh "${VERSION}"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: proidentity-mail-release-artifacts
          path: |
            dist/*.tar.gz
            dist/SHA256SUMS
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: proidentity-mail-release-artifacts
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
          body: |
            ProIdentity Mail binary release for Linux x64, x86, arm, and arm64.

            Commercial hosted service use requires a ProIdentity commercial license.
